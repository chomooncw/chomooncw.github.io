        /* ==========================================================================
           1. 变量与基础重置 (柔春基础色调与极简硬朗排版)
           ========================================================================== */
        :root {
            --bg-color: #FDFAF1;       /* 纯粹干净的画布白 */
            --text-color: #463128;     /* 极致克制的深黑 */
            /* --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; */
        }
@font-face {
  font-family: 'lacythethree';
  src: url('fonts/lacythethree.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: url('flow/cover.png');background-repeat: no-repeat;
            color: var(--text-color);
            font-family: 'lacythethree', ms pgothic, sans-serif; 
            min-height: 100vh;
            padding: 60px 50px;
            overflow-x: hidden;
        }

        /* ==========================================================================
           2. 左上角现代主义排版 Header (骨架很硬)
           ========================================================================== */
        header {
            position: fixed;
            top: 60px;
            left: 50px;
            z-index: 10;
            max-width: 200px;
        }

        header h1 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: lowercase;
            margin-bottom: 6px;
        }

        header p {
            font-size: 14px;
            line-height: 1.4;
            font-weight: 400;
            color: var(--text-color);
            text-transform: lowercase;
        }

        /* 新增：Logo 图片的精致化控制 */
        .logo-img {
            display: block;
            width: 110px;       /* 核心：控制 Logo 的宽度，建议在 100px - 130px 之间，显得极其精致 */
            height: auto;       /* 保持比例 */
            margin-bottom: 12px; /* 与下方介绍文字的严谨间距 */
            object-fit: contain;
        }
        .cover {
            /* display: block; */
            width: auto;       /* 核心：控制 Logo 的宽度，建议在 100px - 130px 之间，显得极其精致 */
            height: auto;       /* 保持比例 */
            /* margin-bottom: 12px; 与下方介绍文字的严谨间距 */
            /* object-fit: contain; */
}

        /* 新增：菜单栏邮箱链接的精致控制 */
.menu-email {
    display: inline-block;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-color);
    text-decoration: none;      /* 初始状态：去掉死板的下划线 */
    border-bottom: 1px solid var(--text-color); /* 用边框模拟一条极其纤细高级的下划线 */
    margin-top: 24px;           /* 与上方介绍文字保持舒适的秩序间距 */
    text-transform: lowercase;  /* 保持全小写，呼应整体风格 */
    transition: opacity 0.3s ease;
}

/* 鼠标悬停时的微互动：稍微变淡，提示用户这是可以点击的 */
.menu-email:hover {
    opacity: 0.6;
}

        /* ==========================================================================
           3. 隐形绝对网格布局 (灵魂深处的秩序)
           ========================================================================== */
        .art-gallery-grid {
            display: grid;
            /* 7列严谨网格 */
            grid-template-columns: repeat(7, 1fr); 
            /* 上下间距 60px，左右间距 40px，营造呼吸感 */
            gap: 60px 40px; 
            max-width: 1400px;
            margin-left: 120px; /* 为左侧固定的 Header 留出空间 */
            margin-top: 20px;
        }

        /* 每个格子容器 */
        .grid-slot {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 140px;
            position: relative;
        }

        /* 艺术品/贴纸元素 (感性释放) */
        .art-item {
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 100%;
            max-height: 140px;
            object-fit: contain;
            /* 初始状态：纯粹融入页面 */
            transform: scale(1);
        }

        /* 鼠标悬停时的灵动动效：微微放大 */
        .art-item:hover {
            transform: scale(1.12);
            z-index: 5;
        }

        /* ==========================================================================
           4. 响应式布局：保证在平板和手机上也优雅
           ========================================================================== */
        @media (max-width: 1024px) {
            .art-gallery-grid {
                grid-template-columns: repeat(5, 1fr);
                margin-left: 150px;
            }
        }

        @media (max-width: 768px) {
            header {
                position: relative;
                top: 0;
                left: 0;
                max-width: 100%;
                margin-bottom: 40px;
            }
            .art-gallery-grid {
                grid-template-columns: repeat(3, 1fr);
                margin-left: 0;
                gap: 40px 20px;
            }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const artItems = document.querySelectorAll('.art-item');
            
            artItems.forEach(item => {
                // 当鼠标移入时，除了放大，还随机产生一个小小的倾斜角度（-6度到6度之间）
                // 模拟手作那种不完美的、笨拙的可爱感
                item.addEventListener('mouseenter', () => {
                    const randomRotate = (Math.random() * 12 - 6).toFixed(2);
                    item.style.transform = `scale(1.12) rotate(${randomRotate}deg)`;
                });
                
                // 鼠标移出，瞬间回归严谨秩序
                item.addEventListener('mouseleave', () => {
                    item.style.transform = 'scale(1) rotate(0deg)';
                });
            });
        });
    </script>
