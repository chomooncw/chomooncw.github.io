<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" type="image/png"href="img/favicon.png">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dokdo&display=swap" rel="stylesheet">
    <!-- <link rel="stylesheet" href="css/welcome.css"> 	 -->
    <title>RosSort | Studio</title>
    <style>
        /* ==========================================================================
           1. 变量与基础重置 (柔春基础色调与极简硬朗排版)
           ========================================================================== */
        :root {
            --bg-color: #FDFAF1;       /* 纯粹干净的画布白 */
            --text-color: #463128;     /* 极致克制的深黑 */
             }
          @font-face {
            font-family: 'lacythethree';
            src: url('fonts/lacythethree.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
          }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            /* background-image: url('flow/cover.png');background-repeat: no-repeat; */
            color: var(--text-color);
            font-family: 'lacythethree', ms pgothic, sans-serif; 
            min-height: 100vh;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
        }
/* ==========================================================================
           1. 顶级双栏布局 (Flex 容器)
           ========================================================================== */
        .wrapper {
            display: flex;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            gap: 40px; /* 左右两栏的间距 */
        }

        /* ==========================================================================
           2. 左侧大栏目：包含 Header + 规整网格
           ========================================================================== */
        .left-column {
            flex: 1; /* 占用稍微多一点的空间，或者根据需要固定宽度 */
            display: flex;
            flex-direction: column;
            gap: 80px;
        }

        /* ==========================================================================
           2. 左上角现代主义排版 Header (骨架很硬)
           ========================================================================== */
        header {
            position: fixed;
            top: 60px;
            left: 50px;
            z-index: 10;
            max-width: 200px;
        }

        header h1 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: lowercase;
            margin-bottom: 6px;
        }

        header p {
            font-size: 14px;
            line-height: 1.4;
            font-weight: 400;
            color: var(--text-color);
            text-transform: lowercase;
        }

        /* 新增：Logo 图片的精致化控制 */
        .logo-img {
            display: block;
            width: 110px;       /* 核心：控制 Logo 的宽度，建议在 100px - 130px 之间，显得极其精致 */
            height: auto;       /* 保持比例 */
            margin-bottom: 16px; /* 与下方介绍文字的严谨间距 */
            object-fit: contain;
        }

        /* 新增：菜单栏邮箱链接的精致控制 */
.menu-email {
    display: inline-block;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-color);
    text-decoration: none;      /* 初始状态：去掉死板的下划线 */
    border-bottom: 1px solid var(--text-color); /* 用边框模拟一条极其纤细高级的下划线 */
    margin-top: 24px;           /* 与上方介绍文字保持舒适的秩序间距 */
    text-transform: lowercase;  /* 保持全小写，呼应整体风格 */
    transition: opacity 0.3s ease;
}

/* 鼠标悬停时的微互动：稍微变淡，提示用户这是可以点击的 */
.menu-email:hover {
    opacity: 0.6;
}
/* 规整的左侧网格 (Sort 秩序) */
        .left-art-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 严格的3列网格 */
            gap: 30px; /* 网格格子之间的间距 */
            /* background-color: rgba(0,0,0,0.01);  */
            padding: 10px;
        }

        .grid-slot {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            aspect-ratio: 1 / 1; /* 保持格子是完美的正方形 */
            /* border: 1px dashed rgba(0,0,0,0.05);  */
        }

        /* ==========================================================================
           3. 右侧大栏目：感性的大图故事区 (Ros 情感)
           ========================================================================== */
        .right-column {
            flex: 1; /* 右侧占用比例 */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .story-hero-container {
            width: 100%;
            height: 100%;
            padding-left: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 右侧的大复合图 */
        .story-hero-img {
            width: 100%;
            max-height: 60vh; /* 限制最大高度，防止纵向无限拉长撑破屏幕 */
            object-fit: contain; /* 确保图片完整显示，不被裁剪 */
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.03)); 
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .story-hero-img:hover {
            transform: scale(1.02); /* 鼠标悬停时，整张大图产生非常呼吸感的微微放大 */
        }

        /* 独立元素的通用动效 */
        .art-item {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .art-item:hover {
            transform: scale(1.1) rotate(3deg); /* 移入时笨拙地歪头 */
        }

        /* ==========================================================================
           4. 响应式：屏幕太小时自动变成上下堆叠
           ========================================================================== */
        @media (max-width: 900px) {
            .wrapper {
                flex-direction: column;
            }
            .right-column {
                margin-top: 40px;
            }
        }
    </style>
</head>
<body>


  <div class="wrapper">
        
        <div class="left-column">
            <header>
                <a href="index.html"><img src="img/logo.png" alt="rossort" class="logo-img"></a>
        <div class="logo" style="background-image: url('img/logo.png');background-repeat: no-repeat; "></div>
                <p>is drawing,<br>stitching<br>and organizing<br>stories.</p>
                <a href="mailto:cherrycaowen@gmail.com" class="menu-email">contact</a>

            <main class="left-art-grid">
              <div class="grid-slot"></div>
                <div class="grid-slot"><img src="flow/1.png" alt="素材" class="art-item"></div>
                <div class="grid-slot"></div> <div class="grid-slot"><img src="flow/2.png" alt="素材" class="art-item"></div>
                
                <div class="grid-slot"><img src="flow/3.png" alt="素材" class="art-item"></div>

                <div class="grid-slot"></div>
                <div class="grid-slot"><img src="flow/5.png" alt="素材" class="art-item"></div>
                <div class="grid-slot"><img src="flow/6.png" alt="素材" class="art-item"></div>

        <div class="right-column">
            <div class="story-hero-container">
                <img src="flow/cover.png" alt="RosSort Story叢林" class="story-hero-img">
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const artItems = document.querySelectorAll('.art-item');
            
            artItems.forEach(item => {
                // 当鼠标移入时，除了放大，还随机产生一个小小的倾斜角度（-6度到6度之间）
                // 模拟手作那种不完美的、笨拙的可爱感
                item.addEventListener('mouseenter', () => {
                    const randomRotate = (Math.random() * 12 - 6).toFixed(2);
                    item.style.transform = `scale(1.12) rotate(${randomRotate}deg)`;
                });
                
                // 鼠标移出，瞬间回归严谨秩序
                item.addEventListener('mouseleave', () => {
                    item.style.transform = 'scale(1) rotate(0deg)';
                });
            });
        });
    </script>
